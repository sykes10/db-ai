services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: pagila
      POSTGRES_PASSWORD: pagila
      POSTGRES_DB: pagila
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/pagila-init.sh:/docker-entrypoint-initdb.d/01-pagila.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pagila -d pagila"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
